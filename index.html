



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>comfort learning</title>
</head>
<body>
  
  <nav class="navbar">  
    <div class="burger">
           <div class="layer1"></div>
           <div class="layer2"></div>
           <div class="layer3"></div>
    </div> 

    <div class="logo">
        <span class="logo-text">
            <i class="fa-solid fa-graduation-cap" style="margin-right: 0.1em;"></i>Comfort<span style="color: red; font-size:1.1em">Learning</span>
        </span>
    </div>

    <div class="menubar">
        <ul class="list">
            <li class="list-item"> <a href="#">HOME</a> </li>
            <li class="list-item"> <a href="#">COURSES</a> </li>
            <li class="list-item"> <a href="#">PRICING</a> </li>
            <li class="list-item"> <a href="#">ABOUT US</a> </li>
        </ul>
    </div>

    <div class="cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <div class="number-of-item"><span class="noi">0</span></div>
    </div>
  </nav>

  <section class="section1">

    </div>

  <div class="cart-sidebar">
    <div class="cart-title-section">

            <i class="fa fa-times"></i>

    <div class="cart-content"></div>
    <div class="total-sum">

    </div>
    <div class="clear-cart">
        <button class="btn clear-cart-btn">clear cart</button>
    </div>
    <div class="clear-cart" style="margin-top: 10px;">
        <button class="btn clear-cart-btn">proceed to checkout</button>

  </div>

  <div class="menu-sidebar">
    <div class="close-menu">
        <i class="fa fa-times"></i>
    </div>
    <div class="menu-menubar">
        <ul class="menu-list">
            <li class="menu-list-item"><a href="#">HOME</a></li>
